claims:
  - claim_id: UC-WP02-L001
    short_name: support membership witness
    claim_text: An element belongs to the support of a finite family exactly when it belongs to one of the family's members.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - MATHCERT/MathCert/Domains/UnionClosed/Frequency.lean
    assumptions: []
