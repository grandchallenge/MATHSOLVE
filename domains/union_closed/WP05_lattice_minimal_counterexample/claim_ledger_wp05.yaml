claims:
  - claim_id: UC-WP05-L001
    short_name: minimum lattice counterexample has at least two atoms
    claim_text: A minimum-cardinality finite-lattice counterexample to the lattice form of Frankl's conjecture has at least two atoms.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
    assumptions:
      - Minimum cardinality ranges over finite-lattice counterexamples in the same Lean universe.
      - Join-irreducibility is represented by mathlib's SupIrred predicate.
    promotion_condition: Already checked locally; preserve the minimum-counterexample definition and proof under CI.
    knowledge_graph_refs:
      - UC-CLAIM-WP05-L001
      - UC-ARTIFACT-LATTICE-MINIMUM-LEAN

  - claim_id: UC-WP05-L002
    short_name: delete a sup-irreducible element
    claim_text: Removing a sup-irreducible element from a finite bounded lattice admits a lattice structure on the induced ordered subtype.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeDeletion.lean
    assumptions:
      - The replacement meet is the supremum of all elements strictly below the deleted element.
    promotion_condition: Already checked locally; preserve the deletion construction under CI.
    knowledge_graph_refs:
      - UC-WP05

  - claim_id: UC-WP05-L003
