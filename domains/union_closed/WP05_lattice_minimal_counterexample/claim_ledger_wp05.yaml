      - UC-ARTIFACT-LATTICE-DELETION-LEAN

  - claim_id: UC-WP05-L009
    short_name: meet-irreducible sets have a join-irreducible strict majority
    claim_text: For every nonempty finite set M of inf-irreducible elements in a minimum-cardinality finite-lattice counterexample, some sup-irreducible j lies below strictly more than half of M.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeDeletion.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
    assumptions:
      - Minimum cardinality ranges over finite-lattice counterexamples in the same Lean universe.
      - The deleted collection is represented by a nonempty Finset whose members satisfy mathlib's InfIrred predicate.
      - The strict-majority conclusion is stated without division as M.card < 2 * upperConeInterCard j M.
    promotion_condition: Already checked locally; preserve the least-survivor closure, sup-irreducible origin theorem, exact upper-cone partition, and minimum-counterexample contradiction under CI.
    knowledge_graph_refs:
      - UC-CLAIM-WP05-THEOREM-2-9
      - UC-ARTIFACT-LATTICE-MINIMUM-LEAN
      - UC-ARTIFACT-LATTICE-DELETION-LEAN

