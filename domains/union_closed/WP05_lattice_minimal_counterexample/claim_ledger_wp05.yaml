      - Doubly irreducible means both mathlib SupIrred and InfIrred.
      - The exact equation is stated without division as 2 * upperConeCard x = Fintype.card L + 1.
    promotion_condition: Already checked locally; preserve the one-point upper-cone loss bound and deleted-counterexample argument under CI.
    knowledge_graph_refs:
