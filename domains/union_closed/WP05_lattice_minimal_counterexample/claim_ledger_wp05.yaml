  - claim_id: UC-WP05-C015
    short_name: theorem 2.15 sublattice criteria assessment
    claim_text: >-
      Bouchard's Theorem 2.15 asserts that a lattice subposet of a minimum-cardinality finite-lattice counterexample satisfying either a small-cardinality condition or a dual-atom cardinality-gap condition must have a non-endpoint element that covers or is covered by an element outside the subposet. Locally the full source theorem is certified as a hybrid package result: branch (i) combines the exact finite-lattice replay UC-WP05-C016 with the Lean transfer theorem UC-WP05-L016, and branch (ii) is the Lean theorem UC-WP05-L015.
    claim_class: PROVED_IN_PACKAGE
    support_type: LEAN_PROOF
    status: CERTIFIED
    certainty: HYBRID_CERTIFIED_LEAN_PLUS_EXACT_REPLAY
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/THEOREM_2_15_ASSESSMENT.md
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeSubposet.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
      - MATHCERT/certificates/exact/finite_lattices_4_to_7.json
      - MATHCERT/ci/replay_certificates.py
    assumptions:
      - The source subposet order is the induced ambient order, while its lattice operations are internal to the subposet.
      - The small-cardinality branch depends on finite-lattice enumeration for sizes 4 through 7, independently replayed as UC-WP05-C016, plus the Lean no-boundary transfer theorem UC-WP05-L016.
      - The dual-atom branch is formalized for embedded finite lattice subposets as UC-WP05-L015.
      - This is not a single Lean theorem for the disjunctive source statement; it is a package-level hybrid certificate.
    promotion_condition: Already hybrid-certified locally; relabel as a single Lean theorem only if the size 4 through 7 finite-lattice enumeration is internalized in Lean.

  - claim_id: UC-WP05-C016
    short_name: finite lattices of size 4..7 have two doubly irreducibles
    claim_text: An independent exact replay enumerates every finite lattice with 4, 5, 6, or 7 elements, up to relabeling by canonicalization, and verifies that each has at least two elements with exactly one lower cover and exactly one upper cover.
    claim_class: COMPUTED_EXACTLY
    support_type: EXACT_RATIONAL_COMPUTATION
    status: CERTIFIED
    certainty: LEVEL_2_EXHAUSTIVE_REPLAY
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHCERT/certificates/exact/finite_lattices_4_to_7.json
      - MATHCERT/schemas/finite_lattice_small_certificate.schema.json
      - MATHCERT/ci/replay_certificates.py
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/THEOREM_2_15_ASSESSMENT.md
    assumptions:
      - The replay enumerates strict partial orders whose numeric labels are a linear extension; every finite poset has at least one such labeling.
      - The replay checks the lattice property by unique joins and meets for every pair.
      - Unlabeled counts are recovered by canonicalizing the reflexive order under all relabelings; the replay obtains counts 2, 5, 15, and 53 for sizes 4, 5, 6, and 7.
      - Doubly irreducible means exactly one lower cover and exactly one upper cover, matching the source convention for non-endpoint elements.
    promotion_condition: Already replayed locally and in CI; use this only as the finite branch (i) enumeration certificate, not as a Lean-kernel theorem.

  - claim_id: UC-WP05-L016
    short_name: theorem 2.15 small-lattice branch transfer
    claim_text: In a minimum-cardinality finite-lattice counterexample, an embedded finite lattice subposet containing two distinct internally doubly irreducible elements must have a non-endpoint element that covers or is covered by an ambient element outside the embedded carrier.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeSubposet.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
    assumptions:
      - "The finite subposet is represented by an order embedding e : K ->o L, with carrier Finset.univ.image e."
      - The theorem assumes the two internal witnesses are distinct and both SupIrred and InfIrred in the internal lattice K.
      - Under no boundary touch, internal sup- and inf-irreducibility transfer to the ambient lattice, contradicting the checked uniqueness of doubly irreducible elements in a minimum counterexample.
      - The theorem does not enumerate lattices of size 4 through 7; that finite existence fact is supplied by UC-WP05-C016.
    promotion_condition: Already checked locally; preserve the dual no-boundary irreducibility-transfer lemmas and the minimum-counterexample uniqueness theorem under CI.

  - claim_id: UC-WP05-L015
    short_name: theorem 2.15 dual-atom branch
    claim_text: In a minimum-cardinality finite-lattice counterexample, any embedded finite lattice subposet K whose cardinality satisfies 2 < |K| and |K| + 2 < |L|, and whose top lies above an ambient coatom, has a non-endpoint element that covers or is covered by an ambient element outside the embedded carrier.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeSubposet.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
    assumptions:
      - "The finite subposet is represented by an order embedding e : K ->o L, with carrier Finset.univ.image e."
      - The cardinality hypothesis is stated in subtraction-free Lean form as Fintype.card K + 2 < Fintype.card L.
      - The theorem certifies only branch (ii) of Bouchard's Theorem 2.15; the small-cardinality enumeration dependency is separately replay-certified as UC-WP05-C016.
    promotion_condition: Already checked locally; preserve the embedded-subposet boundary predicate, irreducibility transfer, one- and two-point cone-loss lemmas, and minimum-counterexample contradiction under CI.

  - claim_id: UC-WP05-L017
    short_name: conditional theorem 2.7 via RivalBound
    claim_text: If a minimum-cardinality finite-lattice counterexample L satisfies the local RivalBound predicate, then every sup-irreducible element j has upperConeCard j strictly greater than latticeLength L.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - https://www.cambridge.org/core/services/aop-cambridge-core/content/view/CA7B5CFBC33759F8F94D64B9AC7133BB/S0008439500070454a.pdf/div-class-title-lattices-with-doubly-irreducible-elements-div.pdf
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeLength.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/THEOREM_2_7_2_8_ASSESSMENT.md
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
    assumptions:
      - RivalBound is an explicit hypothesis in this reusable wrapper; UC-WP05-L019 supplies it for minimum counterexamples.
      - latticeLength is defined as the maximum finite chain cardinality minus one.
      - The proof uses UC-WP05-L007 to bound the locally defined doubly irreducible finset by one element.
      - This certifies the conditional arithmetic wrapper; the unconditional promoted theorem is UC-WP05-L017A.
    promotion_condition: Already checked locally; preserve as the reusable conditional wrapper and preserve UC-WP05-L019/UC-WP05-L017A under CI.

  - claim_id: UC-WP05-L018
    short_name: conditional corollary 2.8 via upper-cone chains
    claim_text: If a minimum-cardinality finite-lattice counterexample L satisfies the local RivalBound predicate, then every element x that is both sup-irreducible and inf-irreducible lies strictly below a non-top element y that is neither sup-irreducible nor inf-irreducible.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://arxiv.org/abs/2503.00277
      - https://www.cambridge.org/core/services/aop-cambridge-core/content/view/CA7B5CFBC33759F8F94D64B9AC7133BB/S0008439500070454a.pdf/div-class-title-lattices-with-doubly-irreducible-elements-div.pdf
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeLength.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeMinimum.lean
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/THEOREM_2_7_2_8_ASSESSMENT.md
      - MATHSOLVE/domains/union_closed/WP05_lattice_minimal_counterexample/README.md
    assumptions:
      - RivalBound is an explicit hypothesis in this reusable wrapper; UC-WP05-L019 supplies it for minimum counterexamples.
      - The local statement uses the non-top form of the source conclusion, avoiding the endpoint-convention trivialization that would otherwise make top a doubly reducible element in mathlib.
      - The upper-cone infrastructure proves that if every non-top element above x is inf-irreducible, then the principal upper cone above x is a chain.
      - The chain is extended by bottom because sup-irreducibility gives x != bottom, yielding upperConeCard x <= latticeLength L and contradicting UC-WP05-L017.
      - This certifies the conditional wrapper; the unconditional promoted theorem is UC-WP05-L018A.
    promotion_condition: Already checked locally; preserve as the reusable conditional wrapper and preserve UC-WP05-L019/UC-WP05-L018A under CI.

  - claim_id: UC-WP05-L019
    short_name: Rival length inequality and endpoint transfer
    claim_text: For every finite bounded lattice, Rival's source-style endpoint-inclusive doubly irreducible finset satisfies 2 * (latticeLength L + 1) <= |L| + |Irr_source(L)|; in a minimum-cardinality finite-lattice counterexample, endpoint transfer identifies this source-style finset with the local mathlib-style doubly irreducible finset and therefore proves RivalBound L.
    claim_class: FORMALIZED
    support_type: LEAN_PROOF
    status: CHECKED
    certainty: CERTIFIED
    source_or_artifact:
      - https://www.cambridge.org/core/services/aop-cambridge-core/content/view/CA7B5CFBC33759F8F94D64B9AC7133BB/S0008439500070454a.pdf/div-class-title-lattices-with-doubly-irreducible-elements-div.pdf
      - MATHCERT/MathCert/Domains/UnionClosed/RivalLength.lean
      - MATHCERT/MathCert/Domains/UnionClosed/LatticeLength.lean
