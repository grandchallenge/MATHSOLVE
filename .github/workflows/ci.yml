name: Solve checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ledgers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install validation dependencies
        run: python -m pip install jsonschema pyyaml
      - name: Validate claim ledgers and programme references
        run: |
          python ci/validate_solve.py
          python ci/test_validate_solve.py
